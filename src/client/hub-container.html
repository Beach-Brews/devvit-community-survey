
<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Community Survey</title>
      <link rel="stylesheet" href="index.css" />
  </head>
  <body class="h-full text-rl-heading bg-rl-bg dark:text-rd-heading dark:bg-rd-bg p-8 flex flex-col gap-8">
    <div class="relative overflow-hidden pointer-cursor isolate mt-xs xs:rounded-4">
        <div id="post-container" style="max-width: 375px; height: 512px; min-height: 512px; max-height: 512px; overflow: hidden" class=" box-border overflow-hidden relative shrink-0 flex flex-col p-0 items-stretch border-0 rounded-dx-sm pointer-events-none [&>:not(.pointer-events-none)]:pointer-events-auto ">
            <div style="width: 100%; height: 100%;" class="flex box-border relative shrink-0 ">
                <iframe class=" border border-rl-border-weak dark:border-rd-border-weak rounded-md" style="flex-grow: 1; max-width: 100%; max-height: 100%" src="hub.html"></iframe>
            </div>
        </div>
    </div>
    <div class="flex gap-2">
        <label for="width-control">Width:</label>
        <input id="width-control" type="number" value="375" class="px-4 py-0.5 border border-rl-border-weak dark:border-rd-border-weak rounded-sm" />
    </div>
    <script>
        const ctl = document.getElementById('width-control');
        ctl.addEventListener('change', () => {
            document.getElementById('post-container').style.maxWidth = `${ctl.value}px`;
        });
    </script>
  </body>
</html>
